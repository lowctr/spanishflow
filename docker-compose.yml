version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: spanishflow
      POSTGRES_USER: spanishflow
      POSTGRES_PASSWORD: spanishflow_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spanishflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://spanishflow:spanishflow_pass@db:5432/spanishflow
      BOT_TOKEN: ${BOT_TOKEN:-}
      SECRET_KEY: ${SECRET_KEY:-dev_secret}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./spanish_words.sql:/data/spanish_words.sql:ro

  migrate:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://spanishflow:spanishflow_pass@db:5432/spanishflow
      SQL_FILE: /data/spanish_words.sql
    command: python migrate.py
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./spanish_words.sql:/data/spanish_words.sql:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
